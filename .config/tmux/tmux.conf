# List of Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# Laptop
set -g @plugin 'tmux-plugins/tmux-battery'

# Continuum and Resurrect Settings
# set -g @continuum-restore 'on'
# set -g @continuum-boot 'on'
# set -g @continuum-save-interval '5'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '$HOME/.cache/tmux/'

# Other Styles 
set -g pane-border-style 'fg=#3d4350'
set -g pane-active-border-style 'fg=#61afef'
set -g window-active-style bg=default
set -g window-style bg=default
set -g message-style 'fg=#61afef bg=#3d4350'
set -g message-command-style 'fg=#61afef bg=#3d4350'
setw -g mode-style 'fg=#61afef bg=#3d4350  bold'

# Status Styles
# Laptop
set -g status-left "#[fg=#282c34,bg=#61afef,bold] #S : #P #[fg=#61afef,bg=#3d4350,nobold,nounderscore,noitalics] #{battery_color_fg}#[bg=#3d4350,bold]#{battery_icon} #{battery_percentage} #[fg=#3d4350,bg=#22262d,nobold,nounderscore,noitalics]"

# set -g status-left "#[fg=#282c34,bg=#61afef,bold] #S : #P #[fg=#61afef,bg=#22262d,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#22262d,bg=#22262d,nobold,nounderscore,noitalics]#[fg=#61afef,bg=#22262d] #{prefix_highlight} #[fg=#3d4350,bg=#22262d,bold,nounderscore,noitalics]#[fg=#61afef,bg=#3d4350] %m/%d/%y  %H:%M:%S  #{continuum_status} 󰁪  #[fg=#61afef,bg=#3d4350,nobold,nounderscore,noitalics]#[fg=#282c34,bg=#61afef,bold] #{client_user}@#h "
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify left
set -g status-position top
set -g status-style 'fg=#61afef bg=#22262d'
setw -g window-status-activity-style "underscore,fg=#61afef,bg=#22262d"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#61afef,bg=#22262d"
setw -g window-status-format "#[fg=#22262d,bg=#22262d,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#22262d,bg=#22262d,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#22262d,bg=#3d4350,nobold,nounderscore,noitalics]#[fg=#61afef,bg=#3d4350,bold] #I  #W #F #[fg=#3d4350,bg=#22262d,nobold,nounderscore,noitalics]"
set -g status-interval 1

# Prefix Highlight Settings
set -g @prefix_highlight_output_prefix "#[fg=#61afef]#[bg=#22262d]#[fg=#22262d]#[bg=#61afef]"
set -g @prefix_highlight_output_suffix ""

# (Laptop) Battery Settings
set -g @batt_remain_short 'true'
set -g @batt_icon_charge_tier8 '󰁹'
set -g @batt_icon_charge_tier7 '󰂁'
set -g @batt_icon_charge_tier6 '󰂀'
set -g @batt_icon_charge_tier5 '󰁾'
set -g @batt_icon_charge_tier4 '󰁽'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier1 ''
set -g @batt_icon_status_charging '󰂄'
# FZF Menu Settings / Custom Menu(s)
# TMUX_FZF_MENU=\
# "foo\necho 'Hello!'\n"\
# "bar\nls ~\n"\
# "sh\nsh ~/test.sh\n"

# Bind(s)
set -g prefix C-Space
set -g default-shell /bin/zsh
bind C-Space send-prefix
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
set -g mouse on
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.local/share/tmux/plugins/tpm/tpm'
