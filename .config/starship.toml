# Get editor completions based on the config schema  
"$schema" = '<https://starship.rs/config-schema.json>'

# Format  
format = '''[╭─ ](dimmed white)$directory($git_branch$git_status$git_state$git_metrics)  
[╰─](dimmed white)$character'''
right_format = '(${custom.vpn}$netns$container)$time($battery$cmd_duration)'
palette = 'onedark'

# Inserts a blank line between shell prompts  
add_newline = true

[palettes.onedark]
black = '#000000'
red = '#e06c75'
green = '#98c379'
yellow = '#e5c07b'
blue = '#61afef'
purple = '#c678dd'
cyan = '#56b6c2'
white = '#abb2bf'

[directory]
style = 'bold blue'
read_only_style = 'bold blue'
read_only = ' '
truncation_symbol = '...'
format = '[$read_only]($read_only_style)[$path]($style) '

[git_branch]  
format = '[$branch(:$remote_branch)]($style) '
style = 'bold green'

[git_metrics]  
disabled = false

[time]
disabled = false
format = '[$time]($style) '

[cmd_duration]
format = '[$duration]($style) '
style = 'bold white'

[custom.vpn]
command = "echo 󰅧 "
style = 'bold green'
when = ''' nmcli dev status | grep 'HomeServer.*connected.*' > /dev/null '''
format = '[$output]($style) '

  
# Disable the package module, hiding it from the prompt completely  
[package]  
disabled = true
